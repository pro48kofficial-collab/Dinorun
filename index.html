<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Мобільний Dino Chrome</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #f7f7f7;
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            user-select: none;
            -webkit-user-select: none;
            overflow-x: hidden;
        }

        h1 {
            color: #333;
            font-size: 24px;
            margin: 5px 0;
        }

        /* Ігрова зона під мобільний екран */
        #game-container {
            position: relative;
            width: 100%;
            max-width: 450px;
            height: 180px;
            background-color: #fff;
            border-bottom: 3px dashed #535353;
            overflow: hidden;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        /* Справжній піксельний динозавр (черезbox-shadow / CSS) */
        #dino {
            position: absolute;
            left: 30px;
            bottom: 0;
            width: 40px;
            height: 43px;
            /* Базовий колір буде змінюватися скінами, тут малюємо класичного дино */
            background: #535353;
            clip-path: polygon(35% 0%, 85% 0%, 85% 20%, 100% 20%, 100% 45%, 75% 45%, 75% 55%, 55% 55%, 55% 70%, 75% 70%, 75% 80%, 60% 80%, 60% 100%, 50% 100%, 50% 85%, 40% 85%, 40% 100%, 30% 100%, 30% 75%, 20% 75%, 20% 60%, 10% 60%, 10% 45%, 0% 45%, 0% 25%, 15% 25%, 15% 15%, 35% 15%);
            transition: background-color 0.2s;
        }

        /* Анімація бігу (тулимо лапки що змінюються) */
        .running {
            animation: runAnim 0.15s infinite alternate;
        }

        @keyframes runAnim {
            0% { clip-path: polygon(35% 0%, 85% 0%, 85% 20%, 100% 20%, 100% 45%, 75% 45%, 75% 55%, 55% 55%, 55% 70%, 75% 70%, 75% 80%, 60% 80%, 60% 100%, 50% 100%, 45% 85%, 40% 85%, 40% 95%, 30% 95%, 30% 75%, 20% 75%, 20% 60%, 10% 60%, 10% 45%, 0% 45%, 0% 25%, 15% 25%, 15% 15%, 35% 15%); }
            100% { clip-path: polygon(35% 0%, 85% 0%, 85% 20%, 100% 20%, 100% 45%, 75% 45%, 75% 55%, 55% 55%, 55% 70%, 75% 70%, 75% 85%, 55% 85%, 55% 100%, 45% 100%, 45% 85%, 40% 85%, 40% 100%, 30% 100%, 30% 75%, 20% 75%, 20% 60%, 10% 60%, 10% 45%, 0% 45%, 0% 25%, 15% 25%, 15% 15%, 35% 15%); }
        }

        /* Піксельний кактус */
        .cactus {
            position: absolute;
            right: -25px;
            bottom: 0;
            width: 22px;
            height: 45px;
            background-color: #535353;
            clip-path: polygon(35% 0%, 65% 0%, 65% 100%, 35% 100%, 35% 65%, 10% 65%, 10% 35%, 35% 35%, 35% 20%, 65% 20%, 65% 40%, 90% 40%, 90% 70%, 65% 70%);
        }

        /* Мобільна статистика */
        #stats {
            width: 100%;
            max-width: 450px;
            display: flex;
            justify-content: space-between;
            margin-top: 8px;
            font-size: 14px;
            font-weight: bold;
            color: #535353;
            background: #fff;
            padding: 8px;
            border-radius: 6px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        /* Головна кнопка дії (Стрибок / Старт) */
        #jump-btn {
            width: 100%;
            max-width: 450px;
            height: 65px;
            margin-top: 10px;
            background-color: #2196F3;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 20px;
            font-weight: bold;
            box-shadow: 0 4px #0b7dda;
            cursor: pointer;
            active-transform: translateY(4px);
        }
        #jump-btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px #0b7dda;
        }

        /* Меню нижче */
        .menu-container {
            width: 100%;
            max-width: 450px;
            margin-top: 15px;
            background: white;
            border-radius: 8px;
            padding: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }

        .tab-btn {
            flex: 1;
            padding: 10px;
            border: none;
            background: #eee;
            cursor: pointer;
            font-weight: bold;
            border-radius: 6px;
            font-size: 14px;
        }

        .tab-btn.active {
            background: #535353;
            color: white;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* Магазин */
        .skins-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
        }

        .skin-card {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: center;
            border-radius: 6px;
            background: #fafafa;
        }

        .skin-preview {
            width: 25px;
            height: 25px;
            margin: 0 auto 8px;
            border-radius: 4px;
        }

        .skin-btn {
            width: 100%;
            padding: 6px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 12px;
        }

        .buy { background-color: #ff9800; color: white; }
        .equip { background-color: #2196F3; color: white; }
        .active-skin { background-color: #4CAF50; color: white; cursor: default; }

        /* Промо */
        .promo-box {
            display: flex;
            gap: 8px;
        }

        .promo-box input {
            flex: 1;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
        }

        .promo-box button {
            padding: 8px 15px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            font-size: 14px;
        }

        #promo-msg {
            margin-top: 8px;
            font-size: 13px;
            font-weight: bold;
        }

        #start-msg {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 15px;
            color: #535353;
            font-weight: bold;
            text-align: center;
            width: 90%;
            background: rgba(255,255,255,0.8);
            padding: 5px;
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <h1>Dino Mobile</h1>
    
    <div id="game-container">
        <div id="dino" class="running"></div>
        <div id="start-msg">Натисни СТРИБОК, щоб почати біг!</div>
    </div>

    <button id="jump-btn" onclick="handleActionButton()">СТРИБОК / СТАРТ</button>

    <div id="stats">
        <div>Очки: <span id="score">0</span></div>
        <div>Рекорд: <span id="high-score">0</span></div>
        <div>Монети: 💰<span id="coins">0</span></div>
    </div>

    <div class="menu-container">
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('shop')">🛒 Магазин</button>
            <button class="tab-btn" onclick="switchTab('promo')">🎁 Промо</button>
        </div>

        <div id="shop-tab" class="tab-content active">
            <div class="skins-grid" id="skins-container"></div>
        </div>

        <div id="promo-tab" class="tab-content">
            <div class="promo-box">
                <input type="text" id="promo-input" placeholder="Код (напр. PROMO1)...">
                <button onclick="activatePromo()">ОК</button>
            </div>
            <p id="promo-msg"></p>
        </div>
    </div>

    <script>
        const dino = document.getElementById('dino');
        const gameContainer = document.getElementById('game-container');
        const scoreEl = document.getElementById('score');
        const highScoreEl = document.getElementById('high-score');
        const coinsEl = document.getElementById('coins');
        const startMsg = document.getElementById('start-msg');
        const skinsContainer = document.getElementById('skins-container');
        const jumpBtn = document.getElementById('jump-btn');

        let isJumping = false;
        let isPlaying = false;
        let score = 0;
        let obstacleTimeout;
        let scoreInterval;
        let gameSpeed = 5;

        let playerData = JSON.parse(localStorage.getItem('dino_mobile_data')) || {
            highScore: 0,
            coins: 0,
            ownedSkins: ['default'],
            activeSkin: 'default',
            usedPromos: []
        };

        const skinsData = [
            { id: 'default', name: 'Класик', cost: 0, color: '#535353' },
            { id: 'skin1', name: 'Початківець', cost: 20, color: '#ff5722' },
            { id: 'skin2', name: 'Морський', cost: 100, color: '#00bcd4' },
            { id: 'skin3', name: 'Блогер', cost: 500, color: '#9c27b0' },
            { id: 'skin4', name: 'Геймер', cost: 1500, color: '#4caf50' },
            { id: 'skin5', name: 'Кіберспорт', cost: 5000, color: '#ffeb3b' },
            { id: 'skin6', name: 'Лорд Дракон', cost: 10000, color: '#e91e63' }
        ];

        const promos = {};
        for (let i = 1; i <= 25; i++) {
            promos[`PROMO${i}`] = i * 100;
        }
        promos['BLOCKSTRIKE'] = 5000;
        promos['TKBPY'] = 3000;

        function init() {
            highScoreEl.innerText = playerData.highScore;
            coinsEl.innerText = playerData.coins;
            applySkin();
            renderShop();
            dino.classList.remove('running'); // Не біжить, поки не розпочато гру
        }

        function saveProgress() {
            localStorage.setItem('dino_mobile_data', JSON.stringify(playerData));
            highScoreEl.innerText = playerData.highScore;
            coinsEl.innerText = playerData.coins;
        }

        // Обробник натискання головної кнопки (підходить і для ПК Пробілу)
        function handleActionButton() {
            if (!isPlaying) {
                startGame();
            } else {
                jump();
            }
        }

        document.addEventListener('keydown', function(e) {
            if (e.code === 'Space') {
                e.preventDefault();
                handleActionButton();
            }
        });

        function jump() {
            if (isJumping || !isPlaying) return;
            isJumping = true;
            dino.classList.remove('running'); // Зупиняємо анімацію ніг у повітрі
            
            let position = 0;
            let upInterval = setInterval(() => {
                if (position >= 105) {
                    clearInterval(upInterval);
                    let downInterval = setInterval(() => {
                        if (position <= 0) {
                            clearInterval(downInterval);
                            isJumping = false;
                            if(isPlaying) dino.classList.add('running'); // Повертаємо біг на землі
                        }
                        position -= 5;
                        dino.style.bottom = position + 'px';
                    }, 12);
                }
                position += 7;
                dino.style.bottom = position + 'px';
            }, 12);
        }

        function startGame() {
            isPlaying = true;
            score = 0;
            gameSpeed = 5;
            startMsg.style.display = 'none';
            scoreEl.innerText = score;
            dino.classList.add('running');
            jumpBtn.innerText = 'СТРИБОК 🆙';

            document.querySelectorAll('.cactus').forEach(c => c.remove());

            scoreInterval = setInterval(() => {
                score++;
                scoreEl.innerText = score;
                
                if (score % 100 === 0) {
                    playerData.coins += 20;
                    coinsEl.innerText = playerData.coins;
                    saveProgress();
                }

                if (score % 200 === 0) gameSpeed += 0.8;
            }, 100);

            spawnObstacle();
        }

        function spawnObstacle() {
            if (!isPlaying) return;

            const cactus = document.createElement('div');
            cactus.classList.add('cactus');
            // Передаємо кактусу колір поточного скіна для стилю
            cactus.style.backgroundColor = window.getComputedStyle(dino).backgroundColor;
            gameContainer.appendChild(cactus);

            let cactusPosition = gameContainer.offsetWidth;
            cactus.style.left = cactusPosition + 'px';

            let moveInterval = setInterval(() => {
                if (!isPlaying) {
                    clearInterval(moveInterval);
                    return;
                }

                cactusPosition -= gameSpeed;
                cactus.style.left = cactusPosition + 'px';

                let dinoBottom = parseInt(window.getComputedStyle(dino).getPropertyValue('bottom'));
                
                // Колізія підлаштована під пікселі екрана мобілки
                if (cactusPosition > 25 && cactusPosition < 65 && dinoBottom <= 40) {
                    clearInterval(moveInterval);
                    gameOver();
                }

                if (cactusPosition < -25) {
                    clearInterval(moveInterval);
                    cactus.remove();
                }
            }, 15);

            let randomTime = Math.random() * (2200 - 1000) + 1000;
            obstacleTimeout = setTimeout(spawnObstacle, randomTime / (gameSpeed / 5));
        }

        function gameOver() {
            isPlaying = false;
            clearInterval(scoreInterval);
            clearTimeout(obstacleTimeout);
            dino.classList.remove('running');
            
            startMsg.innerHTML = `ГРА ЗАКІНЧЕНА!<br>Рахунок: ${score}`;
            startMsg.style.display = 'block';
            jumpBtn.innerText = 'ЗНОВУ 🔄';

            if (score > playerData.highScore) {
                playerData.highScore = score;
            }
            saveProgress();
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));

            if (tab === 'shop') {
                document.querySelectorAll('.tab-btn')[0].classList.add('active');
                document.getElementById('shop-tab').classList.add('active');
            } else {
                document.querySelectorAll('.tab-btn')[1].classList.add('active');
                document.getElementById('promo-tab').classList.add('active');
            }
        }

        function renderShop() {
            skinsContainer.innerHTML = '';
            skinsData.forEach(skin => {
                const isOwned = playerData.ownedSkins.includes(skin.id);
                const isActive = playerData.activeSkin === skin.id;

                let btnHTML = '';
                if (isActive) {
                    btnHTML = `<button class="skin-btn active-skin">Одягнено</button>`;
                } else if (isOwned) {
                    btnHTML = `<button class="skin-btn equip" onclick="equipSkin('${skin.id}')">Вдягти</button>`;
                } else {
                    btnHTML = `<button class="skin-btn buy" onclick="buySkin('${skin.id}', ${skin.cost})">💰${skin.cost}</button>`;
                }

                skinsContainer.innerHTML += `
                    <div class="skin-card">
                        <div class="skin-preview" style="background-color: ${skin.color}"></div>
                        <div style="font-weight:bold; font-size:12px; margin-bottom:5px;">${skin.name}</div>
                        ${btnHTML}
                    </div>
                `;
            });
        }

        window.buySkin = function(id, cost) {
            if (playerData.coins >= cost) {
                playerData.coins -= cost;
                playerData.ownedSkins.push(id);
                saveProgress();
                renderShop();
            } else {
                alert('Мало коїнів!');
            }
        }

        window.equipSkin = function(id) {
            playerData.activeSkin = id;
            saveProgress();
            applySkin();
            renderShop();
        }

        function applySkin() {
            const currentSkin = skinsData.find(s => s.id === playerData.activeSkin);
            if (currentSkin) {
                dino.style.backgroundColor = currentSkin.color;
            }
        }

        window.activatePromo = function() {
            const input = document.getElementById('promo-input').value.trim().toUpperCase();
            const msg = document.getElementById('promo-msg');

            if (playerData.usedPromos.includes(input)) {
                msg.style.color = 'red';
                msg.innerText = 'Вже використано!';
                return;
            }

            if (promos[input] !== undefined) {
                const reward = promos[input];
                playerData.coins += reward;
                playerData.usedPromos.push(input);
                saveProgress();
                
                msg.style.color = 'green';
                msg.innerText = `+💰${reward} коїнів!`;
                document.getElementById('promo-input').value = '';
            } else {
                msg.style.color = 'red';
                msg.innerText = 'Невірний код!';
            }
        }

        init();
    </script>
</body>
            </html>
