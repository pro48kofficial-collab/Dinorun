<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chrome Dino Game + Shop & Promocodes</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f7f7f7;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            user-select: none;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
        }

        /* Ігрова зона */
        #game-container {
            position: relative;
            width: 600px;
            height: 200px;
            background-color: #fff;
            border-bottom: 2px solid #535353;
            overflow: hidden;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        #dino {
            position: absolute;
            left: 50px;
            bottom: 0;
            width: 40px;
            height: 40px;
            background-color: #535353;
            border-radius: 4px;
            transition: background-color 0.2s;
        }

        /* Очі для динозаврика, щоб був схожий на аватарку */
        #dino::after {
            content: '• •';
            color: white;
            position: absolute;
            top: 5px;
            right: 5px;
            font-size: 12px;
            font-weight: bold;
        }

        .cactus {
            position: absolute;
            right: -20px;
            bottom: 0;
            width: 20px;
            height: 40px;
            background-color: #85a93d;
            border-radius: 3px;
        }

        /* Статистика */
        #stats {
            width: 600px;
            display: flex;
            justify-content: space-between;
            margin-top: 10px;
            font-size: 16px;
            font-weight: bold;
            color: #535353;
        }

        /* Меню / Вкладки */
        .menu-container {
            width: 600px;
            margin-top: 20px;
            background: white;
            border-radius: 8px;
            padding: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .tab-btn {
            flex: 1;
            padding: 10px;
            border: none;
            background: #eee;
            cursor: pointer;
            font-weight: bold;
            border-radius: 5px;
            transition: 0.2s;
        }

        .tab-btn.active {
            background: #535353;
            color: white;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* Магазин скінів */
        .skins-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .skin-card {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: center;
            border-radius: 6px;
            background: #fafafa;
        }

        .skin-preview {
            width: 30px;
            height: 30px;
            margin: 0 auto 10px;
            border-radius: 4px;
        }

        .skin-btn {
            width: 100%;
            padding: 5px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }

        .buy { background-color: #ff9800; color: white; }
        .equip { background-color: #2196F3; color: white; }
        .active-skin { background-color: #4CAF50; color: white; cursor: default; }

        /* Промокоди */
        .promo-box {
            display: flex;
            gap: 10px;
        }

        .promo-box input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
        }

        .promo-box button {
            padding: 10px 20px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        #promo-msg {
            margin-top: 10px;
            font-weight: bold;
        }

        #start-msg {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 18px;
            color: #777;
            font-weight: bold;
            text-align: center;
        }
    </style>
</head>
<body>

    <h1>Chrome Dino Game</h1>
    
    <!-- Ігрове поле -->
    <div id="game-container" onclick="jump()">
        <div id="dino"></div>
        <div id="start-msg">Натисни Пробіл або Клікни, щоб почати</div>
    </div>

    <!-- Статистика -->
    <div id="stats">
        <div>Рахунок: <span id="score">0</span></div>
        <div>Рекорд: <span id="high-score">0</span></div>
        <div>Коїни: 💰<span id="coins">0</span></div>
    </div>

    <!-- Магазин та Промокоди -->
    <div class="menu-container">
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('shop')">🛒 Магазин скінів</button>
            <button class="tab-btn" onclick="switchTab('promo')">🎁 Промокоди</button>
        </div>

        <!-- Вкладка Магазину -->
        <div id="shop-tab" class="tab-content active">
            <div class="skins-grid" id="skins-container">
                <!-- Скіни генеруються через JS -->
            </div>
        </div>

        <!-- Вкладка Промокодів -->
        <div id="promo-tab" class="tab-content">
            <div class="promo-box">
                <input type="text" id="promo-input" placeholder="Введіть промокод...">
                <button onclick="activatePromo()">Активувати</button>
            </div>
            <p id="promo-msg"></p>
        </div>
    </div>

    <script>
        // Елементи DOM
        const dino = document.getElementById('dino');
        const gameContainer = document.getElementById('game-container');
        const scoreEl = document.getElementById('score');
        const highScoreEl = document.getElementById('high-score');
        const coinsEl = document.getElementById('coins');
        const startMsg = document.getElementById('start-msg');
        const skinsContainer = document.getElementById('skins-container');

        // Ігрові змінні
        let isJumping = false;
        let isPlaying = false;
        let score = 0;
        let obstacleTimeout;
        let scoreInterval;
        let gameSpeed = 5;

        // Збереження прогресу в LocalStorage
        let playerData = JSON.parse(localStorage.getItem('dino_player_data')) || {
            highScore: 0,
            coins: 0,
            ownedSkins: ['default'],
            activeSkin: 'default',
            usedPromos: []
        };

        // Дані про скіни (від 20 до 10000 коїнів)
        const skinsData = [
            { id: 'default', name: 'Класик', cost: 0, color: '#535353' },
            { id: 'skin1', name: 'Початківець', cost: 20, color: '#ff5722' },
            { id: 'skin2', name: 'Морський', cost: 100, color: '#00bcd4' },
            { id: 'skin3', name: 'Блогер', cost: 500, color: '#9c27b0' },
            { id: 'skin4', name: 'Геймер', cost: 1500, color: '#4caf50' },
            { id: 'skin5', name: 'Кіберспорт', cost: 5000, color: '#ffeb3b' },
            { id: 'skin6', name: 'Лорд Дракон', cost: 10000, color: '#e91e63' }
        ];

        // 25 Промокодів (PROMO1 - PROMO25)
        const promos = {};
        for (let i = 1; i <= 25; i++) {
            promos[`PROMO${i}`] = i * 100; // Кожен наступний дає більше коїнів (від 100 до 2500)
        }
        // Додатковий секретний промокод для фану
        promos['BLOCKSTRIKE'] = 5000;
        promos['TKBPY'] = 3000;

        // Ініціалізація
        function init() {
            highScoreEl.innerText = playerData.highScore;
            coinsEl.innerText = playerData.coins;
            applySkin();
            renderShop();
        }

        function saveProgress() {
            localStorage.setItem('dino_player_data', JSON.stringify(playerData));
            highScoreEl.innerText = playerData.highScore;
            coinsEl.innerText = playerData.coins;
        }

        // Керування стрибком
        document.addEventListener('keydown', function(e) {
            if (e.code === 'Space') {
                if (!isPlaying) startGame();
                else jump();
            }
        });

        function jump() {
            if (isJumping || !isPlaying) return;
            isJumping = true;
            let position = 0;
            
            // Анімація стрибка вверх-вниз
            let upInterval = setInterval(() => {
                if (position >= 120) {
                    clearInterval(upInterval);
                    let downInterval = setInterval(() => {
                        if (position <= 0) {
                            clearInterval(downInterval);
                            isJumping = false;
                        }
                        position -= 6;
                        dino.style.bottom = position + 'px';
                    }, 12);
                }
                position += 8;
                dino.style.bottom = position + 'px';
            }, 12);
        }

        // Старт гри
        function startGame() {
            isPlaying = true;
            score = 0;
            gameSpeed = 6;
            startMsg.style.display = 'none';
            scoreEl.innerText = score;

            // Очищення старих кактусів
            document.querySelectorAll('.cactus').forEach(c => c.remove());

            // Лічильник очок
            scoreInterval = setInterval(() => {
                score++;
                scoreEl.innerText = score;
                
                // Кожні 100 очок конвертуються в +20 коїнів прямо під час гри!
                if (score % 100 === 0) {
                    playerData.coins += 20;
                    coinsEl.innerText = playerData.coins;
                    saveProgress();
                }

                // Збільшення швидкості
                if (score % 200 === 0) gameSpeed += 1;
            }, 100);

            spawnObstacle();
        }

        // Генерація перешкод (кактусів)
        function spawnObstacle() {
            if (!isPlaying) return;

            const cactus = document.createElement('div');
            cactus.classList.add('cactus');
            gameContainer.appendChild(cactus);

            let cactusPosition = 600;
            cactus.style.left = cactusPosition + 'px';

            let moveInterval = setInterval(() => {
                if (!isPlaying) {
                    clearInterval(moveInterval);
                    return;
                }

                cactusPosition -= gameSpeed;
                cactus.style.left = cactusPosition + 'px';

                // Перевірка на зіткнення (Колізія)
                let dinoBottom = parseInt(window.getComputedStyle(dino).getPropertyValue('bottom'));
                
                if (cactusPosition > 50 && cactusPosition < 90 && dinoBottom <= 40) {
                    clearInterval(moveInterval);
                    gameOver();
                }

                // Видалення кактуса за межами екрану
                if (cactusPosition < -20) {
                    clearInterval(moveInterval);
                    cactus.remove();
                }
            }, 15);

            // Рандомний час до наступного кактуса
            let randomTime = Math.random() * (2000 - 900) + 900;
            obstacleTimeout = setTimeout(spawnObstacle, randomTime / (gameSpeed / 5));
        }

        // Кінець гри
        function gameOver() {
            isPlaying = false;
            clearInterval(scoreInterval);
            clearTimeout(obstacleTimeout);
            startMsg.innerHTML = `Кінець гри!<br>Рахунок: ${score}<br>Натисни Пробіл/Клік для перезапуску`;
            startMsg.style.display = 'block';

            // Перевірка рекорду
            if (score > playerData.highScore) {
                playerData.highScore = score;
            }
            saveProgress();
        }

        // Перемикання вкладок меню
        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));

            if (tab === 'shop') {
                document.querySelectorAll('.tab-btn')[0].classList.add('active');
                document.getElementById('shop-tab').classList.add('active');
            } else {
                document.querySelectorAll('.tab-btn')[1].classList.add('active');
                document.getElementById('promo-tab').classList.add('active');
            }
        }

        // Відображення магазину
        function renderShop() {
            skinsContainer.innerHTML = '';
            skinsData.forEach(skin => {
                const isOwned = playerData.ownedSkins.includes(skin.id);
                const isActive = playerData.activeSkin === skin.id;

                let btnHTML = '';
                if (isActive) {
                    btnHTML = `<button class="skin-btn active-skin">Одягнено</button>`;
                } else if (isOwned) {
                    btnHTML = `<button class="skin-btn equip" onclick="equipSkin('${skin.id}')">Вдягти</button>`;
                } else {
                    btnHTML = `<button class="skin-btn buy" onclick="buySkin('${skin.id}', ${skin.cost})">Купити 💰${skin.cost}</button>`;
                }

                skinsContainer.innerHTML += `
                    <div class="skin-card">
                        <div class="skin-preview" style="background-color: ${skin.color}"></div>
                        <div style="font-weight:bold; font-size:14px; margin-bottom:5px;">${skin.name}</div>
                        ${btnHTML}
                    </div>
                `;
            });
        }

        // Купівля скіна
        window.buySkin = function(id, cost) {
            if (playerData.coins >= cost) {
                playerData.coins -= cost;
                playerData.ownedSkins.push(id);
                saveProgress();
                renderShop();
            } else {
                alert('Не вистачає коїнів!');
            }
        }

        // Зміна скіна (аватарки)
        window.equipSkin = function(id) {
            playerData.activeSkin = id;
            saveProgress();
            applySkin();
            renderShop();
        }

        function applySkin() {
            const currentSkin = skinsData.find(s => s.id === playerData.activeSkin);
            if (currentSkin) {
                dino.style.backgroundColor = currentSkin.color;
            }
        }

        // Активація промокодів
        window.activatePromo = function() {
            const input = document.getElementById('promo-input').value.trim().toUpperCase();
            const msg = document.getElementById('promo-msg');

            if (playerData.usedPromos.includes(input)) {
                msg.style.color = 'red';
                msg.innerText = 'Цей промокод вже активовано!';
                return;
            }

            if (promos[input] !== undefined) {
                const reward = promos[input];
                playerData.coins += reward;
                playerData.usedPromos.push(input);
                saveProgress();
                
                msg.style.color = 'green';
                msg.innerText = `Успішно! Додано +💰${reward} коїнів.`;
                document.getElementById('promo-input').value = '';
            } else {
                msg.style.color = 'red';
                msg.innerText = 'Неправильний промокод!';
            }
        }

        // Старт системи
        init();
    </script>
</body>
</html>
